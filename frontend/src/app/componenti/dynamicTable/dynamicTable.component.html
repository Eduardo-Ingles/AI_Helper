<div class="mat-container">
	<table mat-table [dataSource]="dataSource" class="mat-elevation-z8 demo-table">
		<!-- Position Column -->
		<ng-container matColumnDef="position">
			<th mat-header-cell *matHeaderCellDef>No.</th>
			<td mat-cell *matCellDef="let element">{{element.position}}</td>
		</ng-container>
	
		<!-- owner Column -->
		<ng-container matColumnDef="owner">
			<th mat-header-cell *matHeaderCellDef>Owner</th>
			<td mat-cell *matCellDef="let element">{{element.owner}}</td>
		</ng-container>
	
		<!-- timestamp Column -->
		<ng-container matColumnDef="timestamp">
			<th mat-header-cell *matHeaderCellDef>Data</th>
			<td mat-cell *matCellDef="let element">{{element.timestamp}}</td>
		</ng-container>


		<!-- task Column -->
		<ng-container matColumnDef="task">
			<th mat-header-cell *matHeaderCellDef>Task</th>
			<td mat-cell *matCellDef="let element">{{element.task}}</td>
		</ng-container>
	
		
		<!-- files Column -->
		<ng-container matColumnDef="files">
			<th mat-header-cell *matHeaderCellDef>File caricati</th>
			<td mat-cell *matCellDef="let element">{{element.files}}</td>
		</ng-container>
	
		
		<!-- textArea Column -->
		<ng-container matColumnDef="text">
			<th mat-header-cell *matHeaderCellDef>Nome Galleria</th>
			<td mat-cell *matCellDef="let element">{{element.text}}</td>
		</ng-container>
	

		<!-- DB Column -->
		<ng-container matColumnDef="db">
			<th mat-header-cell *matHeaderCellDef>DataBase</th>
			<td mat-cell *matCellDef="let element">{{element.db}}</td>
		</ng-container> 
	

		<!-- Message Column -->
		<ng-container matColumnDef="messages">
			<th mat-header-cell *matHeaderCellDef>Messages</th>
			<!-- <td mat-cell *matCellDef="let element">{{element.messages}}</td> -->
			<td mat-cell *matCellDef="let element">
				<button mat-button (click)="openDialog(element.messages)">Apri</button>
			</td>		
		</ng-container>
	
		<!-- status Column -->
		<ng-container matColumnDef="status">
			<th mat-header-cell *matHeaderCellDef>Status</th>
			<!-- <td mat-cell *matCellDef="let element">{{element.status}}</td> -->
			<td mat-cell *matCellDef="let element">
				<custom-progress-spinner [value] = element.status  [mode] = spinnerMode [color] = element.colore [hideSpinner] = hideSpinner></custom-progress-spinner>
			</td>			
		</ng-container>
	
		<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
	</table>

</div>
