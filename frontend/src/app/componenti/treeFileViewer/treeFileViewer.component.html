<div class="treeContainer">
	<mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">
		<!-- File nodes -->
		<mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
			<button mat-icon-button disabled></button>
			<!-- Conditionally render download link for files -->
			<a 
				*ngIf="node.type === 'file'" 
				href="javascript:void(0)"
				(click)="onFileDownload(node)"
				class="file-download-link"
			>
			<mat-icon>file_copy</mat-icon>
				{{node.name}}
			</a>
			<!-- Regular text for directories -->
			<span *ngIf="node.type === 'directory'">
				<mat-icon>folder</mat-icon>
				{{node.name}}
			</span>
		</mat-tree-node>

		<!-- Expandable nodes -->
		<mat-tree-node *matTreeNodeDef="let node;when: hasChild" matTreeNodePadding matTreeNodeToggle
					[cdkTreeNodeTypeaheadLabel]="node.name">
			<button mat-icon-button matTreeNodeToggle
					[attr.aria-label]="'Toggle ' + node.name">
				<mat-icon class="mat-icon-rtl-mirror">create_new_folder
					{{tree.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
				</mat-icon>
			</button>
			{{node.name}}
		</mat-tree-node>
	</mat-tree>
</div>
